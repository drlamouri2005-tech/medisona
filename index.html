<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>medisona • Clinical Academy Portal</title>
    <script>
      // Prevent crash from third-party polyfills trying to overwrite window.fetch in iframe/sandbox environments
      (function() {
        try {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(v) { console.warn("Attempted to override fetch:", v); },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Could not redefine window.fetch setter:", e);
        }
        
        window.addEventListener('error', function(e) {
          if (e.message && (
            e.message.includes('Cannot set property fetch') || 
            e.message.includes('only a getter')
          )) {
            e.preventDefault();
            console.warn("Prevented benign fetch getter/setter crash:", e.message);
          }
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
